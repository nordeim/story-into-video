# pnpm configuration
# The `packages` field is required by pnpm 9+ even for single-package repos
# when this file exists. Listing '.' declares the repo root as the only
# workspace package. Without it, `pnpm install` fails with:
#   ERR_PNPM_INVALID_WORKSPACE_CONFIGURATION  packages field missing or empty
packages:
  - '.'

# Allow specific native build scripts to run during install.
#
# In pnpm 10.26+, `allowBuilds` (a map of package→boolean) REPLACED the older
# `onlyBuiltDependencies` (an array) and `ignoredBuiltDependencies`. In pnpm 11,
# the older arrays were removed entirely and are silently ignored if present.
#
# We use `allowBuilds` exclusively (single syntax, no redundancy). The engine
# floor in package.json is set to pnpm >=10.26.0 to enforce this.
#
# Security hardening: only packages explicitly listed here can run postinstall
# scripts. All other packages' build scripts are skipped — prevents malicious
# packages from running arbitrary code on install.
allowBuilds:
  # esbuild: required by drizzle-kit, vitest, tsx — they bundle via esbuild
  esbuild: true
  # protobufjs: transitive dep (used by @bufbuild/protobuf ecosystem) — has a
  # postinstall that generates dynamic code. Present in pnpm-lock.yaml.
  protobufjs: true
  # sharp: image optimization (Next.js image component). Native module.
  sharp: true
  # unrs-resolver: native resolver used by eslint-plugin-import-x and friends.
  unrs-resolver: true
